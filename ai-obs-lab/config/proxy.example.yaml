# ai-obs-lab proxy config (copy to ~/.ai-obs-lab/proxy.yaml or pass --config).
listen: 127.0.0.1:8788
log_dir: ~/.ai-obs-lab/logs

# Headers to redact in stored trace records (case-insensitive).
# Their sha256[:8] is recorded as a fingerprint so you can tell two requests
# used different keys without ever seeing the keys themselves.
redact_headers:
  - authorization
  - x-api-key
  - x-goog-api-key
  - anthropic-api-key

upstreams:
  anthropic: https://api.anthropic.com
  openai: https://api.openai.com
  # Add any OpenAI-compatible gateway (CodeFuse, GLM, internal proxy, etc.) under profiles.
  # The proxy will forward /upstream/<name>/<path> to <base_url>/<path>.
  profiles:
    cfuse: https://your-cfuse-gateway.example.com
    glm: https://open.bigmodel.cn/api/paas/v4
